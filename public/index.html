<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Wise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

/* FUNDO COM IMAGEM */
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1639322537228-f710d846310a");

background-size:cover;
background-position:center;
}

/* CAIXA LOGIN */
.login-box{
width:340px;
padding:40px;
border-radius:25px;

background: rgba(255,255,255,0.1);
backdrop-filter: blur(25px);

text-align:center;
color:white;

box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* AVATAR */
.avatar{
width:90px;
height:90px;
border-radius:50%;
background: rgba(255,255,255,0.2);
margin:auto;
margin-bottom:20px;
}

/* INPUT */
.input-group{
margin:20px 0;
}

input{
width:100%;
padding:14px;
border:none;
border-bottom:2px solid rgba(255,255,255,0.5);
background:transparent;
color:white;
outline:none;
font-size:16px;
}

/* BOTÃO */
button{
width:100%;
padding:15px;
border:none;
border-radius:25px;

background: linear-gradient(90deg,#ff416c,#3b82f6);
color:white;
font-weight:bold;
font-size:16px;

cursor:pointer;
}

/* EFEITO HOVER */
button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="login-box">

<div class="avatar"></div>

<h2>Smart Wise</h2>

<div class="input-group">
<input id="email" placeholder="Email">
</div>

<div class="input-group">
<input id="senha" type="password" placeholder="Senha">
</div>

<button onclick="login()">Entrar</button>

</div>

<script>
function login(){
localStorage.setItem("logado","true")
window.location="chat.html"
}
</script>

</body>
</html>
