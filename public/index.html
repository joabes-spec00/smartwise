<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Wise</title>

<style>

/* FUNDO COM IMAGEM */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

/* imagem + efeito escuro */
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
url("https://images.unsplash.com/photo-1639322537228-f710d846310a");

background-size:cover;
background-position:center;
}

/* CARD LOGIN */
.login-box{
width:320px;
padding:40px;
border-radius:25px;

background: rgba(255,255,255,0.1);
backdrop-filter: blur(25px);

text-align:center;
color:white;

box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* FOTO PERFIL */
.avatar{
width:80px;
height:80px;
border-radius:50%;
background: rgba(255,255,255,0.2);
margin:auto;
margin-bottom:20px;
}

/* INPUTS */
.input-group{
margin:20px 0;
text-align:left;
}

.input-group input{
width:100%;
padding:12px;
border:none;
border-bottom:2px solid rgba(255,255,255,0.5);
background:transparent;
color:white;
outline:none;
}

/* BOTÃO */
button{
width:100%;
padding:15px;
border:none;
border-radius:20px;
margin-top:20px;

background: linear-gradient(90deg,#ff416c,#3b82f6);
color:white;
font-weight:bold;
font-size:16px;
}

/* EXTRA */
.options{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:10px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="login-box">

<div class="avatar"></div>

<div class="input-group">
<input id="email" placeholder="Email">
</div>

<div class="input-group">
<input id="senha" type="password" placeholder="Senha">
</div>

<div class="options">
<span><input type="checkbox"> Lembrar</span>
<span>Esqueceu?</span>
</div>

<button onclick="login()">LOGIN</button>

</div>

<script>

// login simples
function login(){
localStorage.setItem("logado","true")
window.location="chat.html"
}

</script>

</body>
  </html>
